<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Encode</title>

  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- ScrollReveal -->
  <script src="https://unpkg.com/scrollreveal"></script>

</head>

<body>
  <nav class="" id="nav_superior">
    <div><h1 class="logo_main">encode <span id="titulo">servicios</span></h1></div>
    <div class="" id="reloj">
      <div id="hora">12:00 <span class="ampm">am</span></div>
      <div id="dia">24 de febrero</div>
    </div>
  </nav>

  <section id="servicios">
    <div class="services-stage">
      <article class="service-showcase">
        <span class="service-node" aria-hidden="true">#</span>

        <button id="btn-backService" class="service-cta" type="button" aria-label="Siguiente servicio">
          <span aria-hidden="true">&rarr;</span>
        </button>

        <div class="service-card">
          <div class="service-card_content">
            <h1 class="service-card_title">Plataformas web avanzadas</h1>

            <p class="service-card_description">
              Breve descripcion del servicio.
              <span>De que trata y que abarca.</span>
              <span class="service-card_description-note">Las etiquetas muestran algo relevante</span>
            </p>

            <ul class="service-card_list">
              <li>Aplicaciones y sitios web</li>
              <li>Web Personalizada</li>
              <li>Web Personalizada</li>
            </ul>
          </div>

          <div class="service-card_tags" aria-label="Etiquetas del servicio">
            <span class="service-tag service-tag-wide">Brief</span>
            <span class="service-tag">html</span>
            <span class="service-tag">css</span>
            <span class="service-tag">vscode</span>
            <span class="service-tag">java</span>
            <span class="service-tag">UI</span>
            <span class="service-tag">diseno</span>
          </div>
        </div>

        <button id="btn-nextService" class="service-cta" type="button" aria-label="Siguiente servicio">
          <span aria-hidden="true">&rarr;</span>
        </button>
      </article>
    </div>
  </section>

  <nav id="nav_inferior">
    <div class="services-float" aria-hidden="true">?</div>

    <div class="services-pagination" aria-label="Paginacion de servicios">
      <button type="button" aria-label="Servicio 1"></button>
      <button type="button" aria-label="Servicio 2"></button>
      <button type="button" class="is-active" aria-label="Servicio 3"></button>
      <button type="button" aria-label="Servicio 4"></button>
      <button type="button" aria-label="Servicio 5"></button>
      <button type="button" aria-label="Servicio 6"></button>
    </div>

    <div class="services-float" aria-hidden="true">M</div>
  </nav>
</body>

<script src="script.js"></script>
</html>
